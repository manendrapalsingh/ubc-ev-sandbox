# Observability + BAP: OTEL Collector, Prometheus, Jaeger, Grafana, Redis, Mock Registry, Onix BAP Plugin
# Adapter sends OTLP to otel-collector:4317 (metrics + traces)
# Config: config/onix/adapter.yaml (mounted at /app/config in container)
# Run from repo root: docker compose -f network_observability/docker-compose.yml up -d
# UIs: Grafana http://localhost:3000 | Jaeger (traces) http://localhost:16686 | BAP HTTP http://localhost:8001



services:
  redis-onix-bap:
    image: redis:alpine
    pull_policy: always
    container_name: redis-onix-bap
    ports:
      - "6379:6379"
    command: redis-server --requirepass your-redis-password
    networks:
      onix-network:
        aliases:
          - redis-bap
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "your-redis-password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Mock Registry Service
  mock-registry:
    image: manendrapalsingh/mock-registry:latest
    pull_policy: always
    container_name: mock-registry
    ports:
      - "3030:3030"
    volumes:
      - ./mock-registry_config.yml:/app/config/config.yaml:ro
    networks:
      - onix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  onix-bap-plugin:
    build:
      context: ..
      dockerfile: Dockerfile.adapter-with-plugins
    image: onix-adapter:local
    container_name: onix-bap-plugin
    ports:
      - "8001:8001"
      - "9003:9003"
    volumes:
      # config/onix (includes adapter.yaml) → /app/config
      - ../config/onix:/app/config:ro
      - ../schemas:/app/schemas:ro
    environment:
      - CONFIG_FILE=/app/config/adapter.yaml
      - REDIS_PASSWORD=your-redis-password
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    restart: unless-stopped
    depends_on:
      redis-onix-bap:
        condition: service_healthy
      mock-registry:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - onix-network
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "8888:8888"
      - "13133:13133"  # health_check extension: http://localhost:13133
      - "55679:55679"  # zpages extension: http://localhost:55679/debug/servicez
    environment:
      # Set to Network Operator Receiver base URL to forward telemetry (e.g. https://receiver.example.com).
      # Default: global-reciver in this stack (build with: docker buildx build -t global-reciver:v1 .)
      - RECEIVER_OTLP_ENDPOINT=${RECEIVER_OTLP_ENDPOINT:-http://global-reciver:6060}
    networks:
      - observability
      - onix-network
    restart: unless-stopped
    depends_on:
      - otel-collector-network


  # Collector 2 - receives network-level OTLP from Collector 1, exports to Loki, Zipkin, Prometheus
  otel-collector-network:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-network
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-network/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4319:4317"
      - "4320:4318"
      - "8890:8890"

    networks:
      - observability
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - observability
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
    restart: unless-stopped

  # OTLP receiver (build: docker buildx build -t global-reciver:v1 . from receiver app dir)
  global-reciver:
    image: global-reciver:v1
    container_name: global-reciver
    ports:
      - "6060:6060"
    environment:
      - HOST_ADDRESS=0.0.0.0:6060
    networks:
      - observability
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    restart: unless-stopped
    depends_on:
      - otel-collector

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - observability
    restart: unless-stopped
    depends_on:
      - prometheus
      - jaeger
      - zipkin
      - loki


  # The ngrep (Sidecar)
  ngrep-onix:
    image: ngrep:v1
    container_name: ngrep-onix
    # This effectively puts ngrep "inside" the otel-lgtm container networking-wise.
    network_mode: service:onix-bap-plugin
    # Shows every request/response body
    command: ngrep -d any -W byline port 4317
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Keep the container running with your default /bin/bash
    tty: true
    stdin_open: true
    depends_on:
      onix-bap-plugin:
        condition: service_started

networks:
  observability:
    driver: bridge
  onix-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
