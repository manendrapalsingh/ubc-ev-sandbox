version: '3.9'

services:
  # Redis for onix-bap-plugin
  redis-onix-bap:
    image: redis:alpine
    pull_policy: always
    container_name: redis-onix-bap
    ports:
      - "6379:6379"
    command: redis-server --requirepass your-redis-password
    networks:
      - onix-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "your-redis-password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Redis for onix-bpp-plugin
  redis-onix-bpp:
    image: redis:alpine
    pull_policy: always
    container_name: redis-onix-bpp
    ports:
      - "6380:6379"
    command: redis-server --requirepass your-redis-password
    networks:
      - onix-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "your-redis-password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Onix BAP Plugin
  onix-bap-plugin:
    image: manendrapalsingh/onix-adapter:test
    pull_policy: always
    container_name: onix-bap-plugin
    ports:
      - "8001:8001"
      - "9003:9003"
    volumes:
      # Mount config directory (writable for symlink creation, but original files won't be modified)
      - ${CONFIG_PATH:-../onix-adaptor/config}/onix-bap:/app/config
      # Mount schema directory (read-only)
      - ../schemas:/app/schemas:ro
    environment:
      - CONFIG_FILE=/app/config/adapter.yaml
      - REDIS_PASSWORD=your-redis-password
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector-bap:4317
    restart: unless-stopped
    depends_on:
      redis-onix-bap:
        condition: service_healthy
      mock-registry:
        condition: service_healthy
      otel-collector-bap:
        condition: service_started
    networks:
      - onix-network
      - observability

  # Onix BPP Plugin
  onix-bpp-plugin:
    image: manendrapalsingh/onix-adapter:test
    pull_policy: always
    container_name: onix-bpp-plugin
    ports:
      - "8002:8002"
      - "9004:9004"
    volumes:
      # Mount config directory (writable for symlink creation, but original files won't be modified)
      - ${CONFIG_PATH:-../onix-adaptor/config}/onix-bpp:/app/config
      # Mount schema directory (read-only)
      - ../schemas:/app/schemas:ro
    environment:
      - CONFIG_FILE=/app/config/adapter.yaml
      - REDIS_PASSWORD=your-redis-password
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector-bpp:4317
    restart: unless-stopped
    depends_on:
      redis-onix-bpp:
        condition: service_healthy
      mock-registry:
        condition: service_healthy
      otel-collector-bpp:
        condition: service_started
    networks:
      - onix-network
      - observability

  # Mock CDS Service
  mock-cds:
    image: manendrapalsingh/mock-cds:latest
    pull_policy: always
    container_name: mock-cds
    ports:
      - "8082:8082"
    volumes:
      # Mount config file from local directory
      - ./mock-cds_config.yml:/app/config/config.yaml:ro
    networks:
      - onix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mock-registry:
        condition: service_healthy

  # Mock Registry Service
  mock-registry:
    image: manendrapalsingh/mock-registry:latest
    pull_policy: always
    container_name: mock-registry
    ports:
      - "3030:3030"
    volumes:
      # Mount config file from local directory
      - ./mock-registry_config.yml:/app/config/config.yaml:ro
    networks:
      - onix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Mock BAP Service
  mock-bap:
    image: manendrapalsingh/mock-bap:latest
    pull_policy: always
    container_name: mock-bap
    ports:
      - "9001:9001"
    volumes:
      # Mount config file from local directory
      - ./mock-bap_config.yml:/app/config/config.yaml:ro
    networks:
      - onix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Mock BPP Service
  mock-bpp:
    image: manendrapalsingh/mock-bpp:latest
    pull_policy: always
    container_name: mock-bpp
    ports:
      - "9002:9002"
    volumes:
      # Mount config file from local directory
      - ./mock-bpp_config.yml:/app/config/config.yaml:ro
      # Mount request.json file (resolves to /app/config/request.json in container)
      - ./request.json:/app/config/request.json:ro
    networks:
      - onix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # OTel Collector for BAP - receives OTLP from onix-bap-plugin, exports to Prometheus/Jaeger/network collector
  otel-collector-bap:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-bap
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-bap/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "8888:8888"
      - "13133:13133"
      - "55679:55679"
    networks:
      - observability
      - onix-network
    restart: unless-stopped
    depends_on:
      - otel-collector-network

  # OTel Collector for BPP - receives OTLP from onix-bpp-plugin, exports to Prometheus/Jaeger/network collector
  otel-collector-bpp:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-bpp
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-bpp/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4321:4317"
      - "4322:4318"
      - "8891:8889"
      - "8892:8888"
      - "13134:13133"
      - "55680:55679"
    networks:
      - observability
      - onix-network
    restart: unless-stopped
    depends_on:
      - otel-collector-network

  # Network-level collector - receives filtered OTLP from BAP/BPP collectors, exports to Loki/Zipkin/Prometheus/Kafka
  otel-collector-network:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-network
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-network/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4319:4317"
      - "4320:4318"
      - "8890:8890"
      - "13135:13133"
    networks:
      - observability
    restart: unless-stopped
    depends_on:
      kafka-observability:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - observability
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    restart: unless-stopped
    depends_on:
      - otel-collector-bap
      - otel-collector-bpp

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - observability
    restart: unless-stopped
    depends_on:
      - prometheus
      - jaeger
      - zipkin
      - loki


  kafka-observability:
    image: confluentinc/cp-kafka:7.5.0
    pull_policy: always
    container_name: kafka-observability
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # KRaft mode configuration
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-observability:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-observability:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Topic and replication settings
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      # Log directories for KRaft
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      # Optional: retention (same as your current production-style settings)
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_LOG_RETENTION_BYTES=1073741824
      - KAFKA_LOG_SEGMENT_BYTES=134217728
    volumes:
      - kafka_observability_data:/var/lib/kafka/data
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M


    # Kafka UI (by Provectus) - Web UI for managing and monitoring Kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: observability
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-observability:9092
    networks:
      - observability
    depends_on:
      kafka-observability:
        condition: service_healthy
    restart: unless-stopped

  
  global-reciver:
    # build:
    #   context: ./global-reciver
    #   dockerfile: Dockerfile
    image: global-reciver:v1
    container_name: global-reciver
    ports:
      - "6060:6060"
    environment:
      - HOST_ADDRESS=0.0.0.0:6060
    networks:
      - observability
    restart: unless-stopped

networks:
  onix-network:
    driver: bridge
  observability:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  kafka_observability_data:

