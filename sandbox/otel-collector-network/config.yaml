# Collector 2 - receives network-level OTLP from Collector 1, exports to Loki, Zipkin, Prometheus

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318


processors:

  batch:
    send_batch_size: 1024
    timeout: 10s

exporters:
  prometheus:
    endpoint: "0.0.0.0:8890"
    namespace: onix_network
    const_labels:
      observability: network-level

  zipkin:
    endpoint: http://zipkin:9411/api/v2/spans
    format: json
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Network-level: forward to Network Operator Receiver API
  otlphttp/receiver:
    endpoint: http://global-reciver:6060
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 100ms
      max_interval: 10s
      max_elapsed_time: 300s

  # Kafka: separate topics per signal, with queue and retry for production
  kafka:
    brokers:
      - kafka-observability:9092
    protocol_version: 3.0.0
    timeout: 10s
    traces:
      topic: traces
      encoding: otlp_proto
    metrics:
      topic: metrics
      encoding: otlp_proto
    logs:
      topic: logs
      encoding: otlp_proto
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 10m
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
    producer:
      compression: gzip
      required_acks: 1

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [ batch]
      exporters: [prometheus, otlphttp/receiver, kafka]

    traces:
      receivers: [otlp]
      processors: [ batch]
      exporters: [zipkin, otlphttp/receiver, kafka]

    logs:
      receivers: [otlp]
      processors: [ batch]
      exporters: [otlphttp/loki, otlphttp/receiver, kafka]

  telemetry:
    logs:
      level: debug