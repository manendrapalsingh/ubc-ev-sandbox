auditRules:
  default:
    - context.transaction_id
    - context.action
    - context.bap_id
    - context.bpp_id
    - context.timestamp
    - error.message
    - error.code
  on_status:
    # --- Context (Traceability) ---
    - context.transaction_id
    - context.message_id
    - context.action
    - context.timestamp
    - context.bap_id
    - context.bpp_id
    # --- Order-level JSON-LD ---
    - message.order.@context
    - message.order.beckn:id
    - message.order.beckn:seller
    - message.order.beckn:orderStatus
    # --- Order Items – Quantity (Business) ---
    - message.order.beckn:orderItems.beckn:quantity.unitCode
    - message.order.beckn:orderItems.beckn:quantity.unitQuantity
    - message.order.beckn:orderItems.beckn:price.value
    - message.order.beckn:orderItems.beckn:price.currency
    - message.order.beckn:orderItems.beckn:price.applicableQuantity.unitCode
    - message.order.beckn:orderItems.beckn:price.applicableQuantity.unitQuantity
    # --- Order Value (Business) ---
    - message.order.beckn:orderValue.value
    - message.order.beckn:orderValue.currency
    # --- Payment (Business) ---
    - message.order.beckn:payment.beckn:id
    - message.order.beckn:payment.beckn:amount.value
    - message.order.beckn:payment.beckn:amount.currency
    - message.order.beckn:payment.beckn:txnRef
    - message.order.beckn:payment.beckn:paidAt
    - message.order.beckn:payment.beckn:beneficiary
    - message.order.beckn:payment.beckn:paymentStatus
  on_update:
    # --- Context (Traceability) ---
    - context.transaction_id
    - context.message_id
    - context.action
    - context.timestamp
    - context.bap_id
    - context.bpp_id
    # --- Order-level JSON-LD ---
    - message.order.@context
    - message.order.beckn:id
    - message.order.beckn:seller
    - message.order.beckn:orderStatus
    # --- Order Items – Quantity (Business) ---
    - message.order.beckn:orderItems.beckn:quantity.unitCode
    - message.order.beckn:orderItems.beckn:quantity.unitQuantity
    - message.order.beckn:orderItems.beckn:price.value
    - message.order.beckn:orderItems.beckn:price.currency
    - message.order.beckn:orderItems.beckn:price.applicableQuantity.unitCode
    - message.order.beckn:orderItems.beckn:price.applicableQuantity.unitQuantity
    # --- Order Value (Business) ---
    - message.order.beckn:orderValue.value
    - message.order.beckn:orderValue.currency
    # --- Payment (Business) ---
    - message.order.beckn:payment.beckn:id
    - message.order.beckn:payment.beckn:amount.value
    - message.order.beckn:payment.beckn:amount.currency
    - message.order.beckn:payment.beckn:txnRef
    - message.order.beckn:payment.beckn:paidAt
    - message.order.beckn:payment.beckn:beneficiary
    - message.order.beckn:payment.beckn:paymentStatus
    # --- Fulfillment ---
    - message.order.beckn:fulfilment.beckn:id
    - message.order.beckn:fulfiment.beckn:deliveryAttributes.sessionStatus

  rating:
    - context.transaction_id
    - context.message_id
    - context.action
    - context.timestamp
    - context.bap_id
    - context.bpp_id
    - message.ratings.id.
    - message.ratings.id.ratingValue
    - message.ratings.category
  support:
    - context.transaction_id
    - context.message_id
    - context.action
    - context.timestamp
    - context.bap_id
    - context.bpp_id
    - message.refId
    - message.refType

